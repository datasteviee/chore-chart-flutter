# Regelmäßige UI-/Integrationstests (PRD CI).
name: UI Tests (scheduled)
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: dart analyze
      - run: flutter test
